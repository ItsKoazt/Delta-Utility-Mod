name: Publish to Modrinth

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Build
        run: ./gradlew build

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          # Replace with your Modrinth project ID (Project Settings -> copy ID,
          # or the 8-character code in your project URL).
          modrinth-id: REPLACE_WITH_MODRINTH_PROJECT_ID
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: build/libs/Delta.jar
          name: Delta Utility Mod ${{ github.event.release.tag_name }}
          version: ${{ github.event.release.tag_name }}
          version-type: release
          loaders: fabric
          game-versions: "26.2"
          dependencies: |
            fabric-api(required)
            modmenu(optional)
